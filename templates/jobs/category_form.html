{% extends 'base.html' %}
{% block title %}Category{% endblock %}
{% block content %}
<div class="max-w-xl rounded-2xl border border-slate-200 bg-white p-6 shadow-sm md:p-8">
    <h2 class="mb-1 text-xl font-bold sm:text-2xl">Category</h2>
    <p class="text-sm text-slate-500 mb-6">Create custom categories to organize your applications.</p>
    <form method="post" class="space-y-5">
        {% csrf_token %}
        {% for field in form %}
            {% include 'partials/form_field.html' with field=field %}
        {% endfor %}
        <div class="flex flex-col-reverse gap-2 border-t border-slate-200 pt-4 sm:flex-row sm:items-center sm:justify-end">
            <a href="{% url 'jobs:category-list' %}" class="w-full rounded-lg border border-slate-300 px-5 py-2.5 text-center text-slate-700 hover:bg-slate-50 sm:w-auto">Cancel</a>
            <button class="w-full rounded-lg bg-slate-900 px-5 py-2.5 text-white hover:bg-slate-800 sm:w-auto">Save Category</button>
        </div>
    </form>
</div>
{% endblock %}
