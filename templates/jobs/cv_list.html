{% extends 'base.html' %}
{% block title %}CV Manager{% endblock %}
{% block content %}
<div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
    <h2 class="text-xl font-bold sm:text-2xl">CV Manager</h2>
    <a href="{% url 'jobs:cv-create' %}" class="w-full rounded-lg bg-slate-900 px-4 py-2.5 text-center text-white hover:bg-slate-800 sm:w-auto">Upload CV</a>
</div>
<div class="overflow-x-auto rounded-2xl border border-slate-200 bg-white shadow-sm">
    <table class="min-w-[640px] w-full text-sm">
        <thead class="bg-slate-100/80 text-slate-700"><tr><th class="p-3 text-left">Name</th><th class="p-3 text-left">Version</th><th class="p-3 text-left">File</th><th class="p-3 text-left">Actions</th></tr></thead>
        <tbody>
            {% for cv in cvs %}
                <tr class="border-t border-slate-100 hover:bg-slate-50/70">
                    <td class="p-3 font-medium">{{ cv.name }}</td>
                    <td class="p-3"><span class="inline-flex rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-700">{{ cv.version }}</span></td>
                    <td class="p-3"><a class="font-medium text-blue-600 hover:text-blue-700" href="{{ cv.file.url }}" download>Download</a></td>
                    <td class="p-3">
                        <div class="flex flex-wrap items-center gap-2">
                        <a class="font-medium text-emerald-600 hover:text-emerald-700" href="{% url 'jobs:cv-preview' cv.pk %}" target="_blank" rel="noreferrer">Preview</a>
                        <a class="font-medium text-blue-600 hover:text-blue-700" href="{% url 'jobs:cv-update' cv.pk %}">Edit</a>
                        <a class="font-medium text-red-600 hover:text-red-700" href="{% url 'jobs:cv-delete' cv.pk %}">Delete</a>
                        </div>
                    </td>
                </tr>
            {% empty %}
                <tr><td colspan="4" class="p-4 text-center text-slate-500">No CV uploaded.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
