{% extends 'base.html' %}
{% block title %}Delete Category{% endblock %}
{% block content %}
<div class="max-w-lg rounded-2xl border border-red-200 bg-white p-5 shadow-sm sm:p-6">
    <h2 class="mb-2 text-xl font-bold text-red-700">Delete category</h2>
    <p class="mb-5 text-sm text-slate-600">Deleting this category will move all jobs to Uncategorized.</p>
    <form method="post" class="space-y-3">
        {% csrf_token %}
        <div class="flex flex-col-reverse gap-2 sm:flex-row sm:justify-end">
            <a href="{% url 'jobs:category-list' %}" class="w-full rounded-lg border border-slate-300 px-4 py-2 text-center text-slate-700 hover:bg-slate-50 sm:w-auto">Cancel</a>
            <button class="w-full rounded-lg bg-red-600 px-4 py-2 font-medium text-white hover:bg-red-700 sm:w-auto">Delete</button>
        </div>
    </form>
</div>
{% endblock %}
