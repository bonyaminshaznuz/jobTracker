services:
  - type: web
    name: jobtracker
    env: python
    # Free plan is fine when using Cloudflare R2 / AWS S3 for media storage.
    # Files are stored in the cloud so Render's ephemeral FS doesn't matter.
    plan: free
    buildCommand: >-
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput
    startCommand: >-
      python manage.py migrate --noinput &&
      python manage.py ensure_superuser &&
      python manage.py repair_file_paths --fix &&
      gunicorn config.wsgi:application --workers 2 --log-file -
    autoDeploy: true
    envVars:
      # ---- Django core ----
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"

      # ---- Media / file storage (Cloudflare R2 or AWS S3) ----
      # Set USE_S3=True to activate cloud storage (required for persistence).
      - key: USE_S3
        value: "True"
      # R2 / S3 credentials — fill these in Render Dashboard > Environment.
      # NEVER commit real credentials here.
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      # For Cloudflare R2: set to "auto"
      # For AWS S3: set to your bucket region e.g. "us-east-1"
      - key: AWS_S3_REGION_NAME
        value: "auto"
      # Cloudflare R2 endpoint: https://<ACCOUNT_ID>.r2.cloudflarestorage.com
      # Leave blank for standard AWS S3.
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      # Optional: R2 public domain (e.g. files.yourdomain.com or the
      # R2.dev subdomain from the Cloudflare dashboard).
      # Leave blank to disable direct public URL (files served via Django view).
      - key: AWS_S3_CUSTOM_DOMAIN
        sync: false

      # ---- Database (set via Render dashboard) ----
      - key: DATABASE_URL
        sync: false

      # ---- Bootstrap superuser ----
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
